
services:
  cfdmgrd:
    image: ghcr.io/nue-mic/cloudflared-manager:${CFDM_IMAGE_TAG:-latest}
    container_name: docker_cfdmgrd
    restart: always
    network_mode: host
    environment:
      # --- required ---
      CFDM_API_TOKEN: ${CFDM_API_TOKEN:-admin@local}

      # --- optional ---
      CFDM_HTTP_ADDR: ":${CFDM_HTTP_PORT:-17200}"
      CFDM_CORS_ORIGINS: ${CFDM_CORS_ORIGINS:-*}
      CFDM_LOG_LEVEL: ${CFDM_LOG_LEVEL:-info}
      CFDM_DOCS_ENABLED: ${CFDM_DOCS_ENABLED:-true}
      TZ: ${TZ:-UTC}

    volumes:
      - ./cfdmgr-data:/data
      # - ${CFDM_DATA_DIR:-./data}:/data

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    # ------------------------------------------------------------------
    # Resource hints. Comment out if you don't use compose v2 deploy
    # constraints. Defaults are generous; the daemon idles at ~30 MB.
    # ------------------------------------------------------------------
    deploy:
      resources:
        limits:
          memory: ${CFDM_MEMORY_LIMIT:-512M}
        reservations:
          memory: 64M

    # ------------------------------------------------------------------
    # Optional: opt-in to Watchtower for unattended image updates.
    # https://containrrr.dev/watchtower/
    # ------------------------------------------------------------------
    labels:
      com.centurylinklabs.watchtower.enable: "${CFDM_AUTOUPDATE:-false}"


