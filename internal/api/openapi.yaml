openapi: 3.1.0
info:
  title: cloudflared-manager API
  description: |
    无头（headless）cloudflared **TOKEN 模式** 隧道管理器。守护进程 `cfdmgrd` 把每个
    cloudflared 连接器（connector）放进**独立的外部子进程**（`cloudflared tunnel run --token …`），
    通过 HTTP/JSON 暴露隧道 CRUD、生命周期、历史曲线、告警、日志、导入导出、系统监控、
    cloudflared 二进制版本管理等管理面。前端 SPA 已 embed 进二进制，生产环境同域。

    关键架构事实（落到 API 字段命名、状态码、错误形态都需要先看一眼）：

    - **外部子进程模型**：每个运行中的隧道都是 `cloudflared tunnel run` 子进程，由
      `internal/process.Worker` 监管。父进程通过 `--token`（环境变量 `TUNNEL_TOKEN`）注入
      连接器令牌；ingress / public-hostname / origin 等参数全部在 Cloudflare Zero Trust
      控制台维护，**不在本模型内**。
    - **reload = 重启**：cloudflared 没有针对单连接器参数的 in-place 热重载语义，
      `POST .../reload` 的实现就是 `stop()` 再 `start()`。
    - **token 高度敏感**：所有返回 `ConfigEnvelope` 的接口里 `config.token` 一律被剥除（空串），
      仅用布尔 `has_token` 表明是否已存储；掩码预览经 `GET /configs/{id}/token` 获取。
      **唯一例外** 是 `GET /configs/{id}/raw`（原样回写磁盘 YAML，按设计包含 token，属敏感导出）。
    - **流量曲线语义特殊**：cloudflared **没有按隧道的字节计数器**。
      `GET /metrics/{id}/traffic` 返回的 `points[].in` = 请求数增量、`out` = 错误数增量、
      `conns` = HA 连接数 gauge（**不是字节**），均来自抓取 cloudflared 自带的 `--metrics`
      Prometheus 端点。
    - **配置数据模型**：业务层（请求/响应里的 `config` 字段）= `TunnelConfigV1`，**全 camelCase**
      （edge/reliability/logging/identity/advancedEnvOverrides/binaryVersion）。
    - **快照 / 事件 / 告警 / 流量 / 系统监控**：`Snapshot`、`/metrics/*`、`/alerts/*`、`/system/*`、
      WebSocket `/events` 帧统一走 **snake_case**（id / inst_id / started_at / metrics_port …）。
    - **配置经环境变量注入**（前缀 `CFDM_`）：
      `CFDM_API_TOKEN`（必填，鉴权令牌）、`CFDM_HTTP_ADDR`（默认 `:8080`）、
      `CFDM_DATA_DIR`（默认 `/var/lib/cfdmgrd`）、`CFDM_CORS_ORIGINS`（默认 `*`）、
      `CFDM_LOG_LEVEL`（默认 `info`）、`CFDM_DOCS_ENABLED`（默认 `true`）、
      `CFDM_RELEASE_PROXY_BASES`（cloudflared 二进制下载的 Release 代理域名，逗号分隔，自动故障转移）、
      `CFDM_RELEASE_PROXY_KEY`（Release 代理配置键，默认 cloudflared-releases）、
      `CFDM_DOWNLOAD_MIRRORS`（旧 GitHub 镜像前缀，仅自更新用）、`CFDM_GITHUB_TOKEN`（旧；代理无需 token）、
      `CFDM_BINARIES_DIR`（cloudflared 二进制存储目录）、
      `CFDM_CLOUDFLARED_DEFAULT_VERSION`（默认 `latest`）、`CFDM_SELF_UPDATE_ENABLED`（默认 `true`）。

    鉴权：除 `GET /api/v1/health` 与 `/api/docs/*` 外，所有接口都需要 `Authorization: Bearer <token>`。
    WebSocket 接口（`/events`、`/configs/{id}/logs/tail`）额外接受 `?token=` 查询参数。

    所有非 2xx 业务错误统一返回 `Error` 信封 `{error:{code,message,details?}}`。请求体解码启用了
    `DisallowUnknownFields()`，请求体里出现未声明的 key 会直接 `400`。
  version: 2.0.0
servers:
  - url: http://localhost:8080
    description: 本地守护进程（CFDM_HTTP_ADDR 默认 :8080）
security:
  - BearerAuth: []

tags:
  - name: system
    description: 健康检查、版本、自更新、系统监控
  - name: configs
    description: 隧道配置 CRUD、生命周期、token、原始 YAML
  - name: metrics
    description: 历史流量曲线与告警规则 / 事件
  - name: logs
    description: 隧道日志查询与实时跟踪
  - name: events
    description: WebSocket 事件推送
  - name: importexport
    description: 配置导入 / 导出
  - name: binaries
    description: cloudflared 二进制版本管理
  - name: cloudflare
    description: |
      Cloudflare 账号直连集成。配置一个或多个 Cloudflare 账号（API Token 或
      邮箱+Global Key，secret 加密落盘、永不回传），自动探测 account_id；把本地实例
      「关联」到远端隧道（带归属校验：解码 connector token 得 account_tag/tunnel_id 并
      调用 GetTunnel 确认归属）；关联后直连官方 API 管理远端隧道、ingress 公共主机名
      （含 DNS 代理 CNAME 同步）、连接器与 DNS 记录——本地复刻官方隧道后台。
      命名分界：账号视图 / 隧道 / zone / DNS 走 snake_case；隧道「配置」(ingress 规则 +
      originRequest 连接参数) 走 cloudflared 原生 camelCase（如 noTLSVerify / httpHostHeader），
      原样直传 Cloudflare。

paths:
  /api/v1/health:
    get:
      tags: [system]
      summary: 健康检查（无需鉴权）
      security: []
      responses:
        "200":
          description: 存活
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  uptime_s: { type: integer, format: int64, description: 守护进程已运行秒数 }

  /api/v1/version:
    get:
      tags: [system]
      summary: 守护进程版本与构建日期
      responses:
        "200":
          description: 版本信息
          content:
            application/json:
              schema:
                type: object
                properties:
                  daemon: { type: string, description: cfdmgrd 版本号 }
                  build_date: { type: string, description: 构建日期 }

  /api/v1/version/check:
    get:
      tags: [system]
      summary: 检查是否有新版本可自更新
      description: 对比运行版本与 GitHub 最新 release，并报告部署方式与一键自更新能力。`?force=1` 跳过约 1 小时缓存。
      parameters:
        - { name: force, in: query, required: false, schema: { type: string }, description: "1 / refresh=1 跳过缓存" }
      responses:
        "200":
          description: 检查结果
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VersionCheck" }

  /api/v1/system/update:
    post:
      tags: [system]
      summary: 触发分离式自更新并重启
      description: 立即返回 202，守护进程随后被替换并重启；客户端应轮询 /health 与 /version 直到版本变化。`?force=1` 强制重装最新版。
      parameters:
        - { name: force, in: query, required: false, schema: { type: string }, description: "1 强制重装当前最新版" }
      responses:
        "202":
          description: 更新已开始
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: updating }
                  from: { type: string }
                  to: { type: string }
                  message: { type: string }
        "400": { $ref: "#/components/responses/BadRequest", description: 部署方式不支持自更新 }
        "403": { $ref: "#/components/responses/Error", description: Web 端自更新被禁用（CFDM_SELF_UPDATE_ENABLED=false） }
        "409": { $ref: "#/components/responses/Conflict", description: "已是最新版本（可加 ?force=1）" }
        "502": { $ref: "#/components/responses/Error", description: 无法获取最新版本（上游失败） }

  /api/v1/system/update/log:
    get:
      tags: [system]
      summary: 读取当前自更新日志（update.log）
      description: 返回 update.log 尾部内容，供 Web 端在更新过程中实时展示下载 / 替换 / 重启等步骤。重启窗口期接口可能短暂不可达，调用方应容忍。
      responses:
        "200":
          description: 日志内容
          content:
            application/json:
              schema:
                type: object
                properties:
                  content: { type: string, description: "update.log 尾部（最多约 64 KiB），无日志时为空串" }

  /api/v1/ui/branding:
    get:
      tags: [system]
      summary: 读取生效的 UI 品牌（公开，无需鉴权）
      description: 返回侧边栏 / 登录页 / 浏览器标题使用的品牌；空字段已用默认值填充。登录页与首屏 <title> 在鉴权前即可渲染，故公开。
      security: []
      responses:
        "200":
          description: 生效品牌
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Branding" }
    put:
      tags: [system]
      summary: 更新 UI 品牌（需鉴权）
      description: 省略的字段保留当前存储值，显式空串重置为默认。品牌持久化在数据目录 meta.json，跨设备 / 清缓存后依然生效，首屏由服务端注入实现零闪。
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Branding" }
      responses:
        "200":
          description: 生效品牌
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Branding" }

  /api/v1/configs:
    get:
      tags: [configs]
      summary: 列出所有隧道配置快照
      responses:
        "200":
          description: 快照列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Snapshot" }
    post:
      tags: [configs]
      summary: 新建隧道配置
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, config]
              properties:
                id: { type: string, description: 配置 id（文件名干）}
                config: { $ref: "#/components/schemas/TunnelConfigV1" }
                cfdmgr: { $ref: "#/components/schemas/MgrMeta" }
      responses:
        "201":
          description: 已创建
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConfigEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/v1/configs/reorder:
    post:
      tags: [configs]
      summary: 持久化前端展示排序
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order]
              properties:
                order:
                  type: array
                  items: { type: string }
                  description: 按期望顺序排列的配置 id
      responses:
        "204": { description: 已保存 }

  /api/v1/configs/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [configs]
      summary: 获取单个配置（含 TunnelConfigV1，token 已剥除）
      responses:
        "200":
          description: 配置信封
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConfigEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [configs]
      summary: 整体替换配置体
      description: 提交空 / 省略 token 表示保留已存储的 token；仅非空 token 才会替换密钥。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [config]
              properties:
                config: { $ref: "#/components/schemas/TunnelConfigV1" }
                cfdmgr: { $ref: "#/components/schemas/MgrMeta" }
      responses:
        "200":
          description: 已更新
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConfigEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [configs]
      summary: RFC 7396 合并补丁（merge-patch）应用于 TunnelConfigV1
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              type: object
              description: TunnelConfigV1 的部分字段；null 值删除对应键
      responses:
        "200":
          description: 已更新
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConfigEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [configs]
      summary: 停止并删除隧道配置
      responses:
        "204": { description: 已删除 }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/configs/{id}/duplicate:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    post:
      tags: [configs]
      summary: 复制配置到新 id（token 不会被复制）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_id]
              properties:
                new_id: { type: string }
      responses:
        "201":
          description: 已复制
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConfigEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/v1/configs/{id}/raw:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [configs]
      summary: 获取磁盘原始 YAML（敏感：按设计包含 token）
      responses:
        "200":
          description: 原始 cloudflared YAML
          content:
            text/yaml:
              schema: { type: string }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [configs]
      summary: 用原始 cloudflared YAML 替换磁盘文件
      requestBody:
        required: true
        content:
          text/yaml:
            schema: { type: string }
      responses:
        "200":
          description: 已写入
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConfigEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/configs/{id}/token:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [configs]
      summary: 获取连接器 token 的掩码预览（永不返回明文）
      responses:
        "200":
          description: 掩码信息
          content:
            application/json:
              schema:
                type: object
                properties:
                  has_token: { type: boolean }
                  masked: { type: string, description: "首 4 + 圆点 + 末 4 的不可逆预览" }
                  length: { type: integer }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/configs/{id}/start:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    post:
      tags: [configs]
      summary: 启动隧道实例
      responses:
        "200":
          description: 启动后的快照
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Snapshot" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict", description: 已在运行 }

  /api/v1/configs/{id}/stop:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    post:
      tags: [configs]
      summary: 停止隧道实例
      responses:
        "200":
          description: 停止后的快照
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Snapshot" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/configs/{id}/reload:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    post:
      tags: [configs]
      summary: 重载隧道实例（实现为 stop + start）
      responses:
        "200":
          description: 重载后的快照
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Snapshot" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/configs/{id}/status:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [configs]
      summary: 获取隧道实例运行状态快照
      responses:
        "200":
          description: 快照
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Snapshot" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/metrics/{id}/traffic:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string }, description: 隧道实例 id }
    get:
      tags: [metrics]
      summary: 历史流量曲线（降采样）
      description: |
        语义特殊：cloudflared 没有按隧道字节计数器。`in` = 请求数增量、`out` = 错误数增量、
        `conns` = HA 连接数 gauge（均非字节）。
      parameters:
        - { name: scope, in: query, required: false, schema: { type: string, default: server } }
        - { name: key, in: query, required: false, schema: { type: string } }
        - { name: from, in: query, required: false, schema: { type: integer, format: int64 }, description: 起始 unix 秒 }
        - { name: to, in: query, required: true, schema: { type: integer, format: int64 }, description: 结束 unix 秒（必填，缺省 400） }
        - { name: step, in: query, required: false, schema: { type: integer, default: 60 }, description: 降采样步长（秒） }
      responses:
        "200":
          description: 曲线
          content:
            application/json:
              schema:
                type: object
                properties:
                  inst_id: { type: string }
                  scope: { type: string }
                  key: { type: string }
                  step: { type: integer }
                  points:
                    type: array
                    items: { $ref: "#/components/schemas/TrafficPoint" }
        "400": { $ref: "#/components/responses/BadRequest", description: "to 缺失" }

  /api/v1/alerts/events:
    get:
      tags: [metrics]
      summary: 列出告警事件
      parameters:
        - { name: state, in: query, required: false, schema: { type: string, enum: [firing, resolved] } }
        - { name: from, in: query, required: false, schema: { type: integer, format: int64 } }
        - { name: to, in: query, required: false, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: 事件列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/AlertEvent" }

  /api/v1/alerts:
    get:
      tags: [metrics]
      summary: 列出告警规则
      responses:
        "200":
          description: 规则列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/AlertRule" }
    post:
      tags: [metrics]
      summary: 创建告警规则（省略 id 时自动生成）
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AlertRule" }
      responses:
        "201":
          description: 已创建
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AlertRule" }
        "400": { $ref: "#/components/responses/BadRequest", description: "metric 须为 conns|requests_rate|errors_rate（traffic_in_rate/traffic_out_rate 为遗留别名），op 须为 >|>=|<|<=" }

  /api/v1/alerts/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [metrics]
      summary: 获取单条告警规则
      responses:
        "200":
          description: 规则
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AlertRule" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [metrics]
      summary: 替换告警规则（id 取自路径）
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AlertRule" }
      responses:
        "200":
          description: 已更新
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AlertRule" }
        "400": { $ref: "#/components/responses/BadRequest" }
    delete:
      tags: [metrics]
      summary: 删除告警规则
      responses:
        "204": { description: 已删除 }

  /api/v1/validate:
    post:
      tags: [configs]
      summary: 校验隧道配置（不持久化）
      description: "Content-Type 为 application/json 时按 TunnelConfigV1 解析；其它 Content-Type 按原始 cloudflared YAML 解析。"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TunnelConfigV1" }
          text/yaml:
            schema: { type: string }
      responses:
        "200":
          description: 校验结果（语法/语义错误也以 200 + valid=false 返回）
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid: { type: boolean }
                  errors: { type: array, items: { type: string } }
                  warnings: { type: array, items: { type: string } }

  /api/v1/configs/{id}/logs:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [logs]
      summary: 查询隧道日志最近若干行
      parameters:
        - { name: lines, in: query, required: false, schema: { type: integer, default: 200 } }
        - { name: level, in: query, required: false, schema: { type: string } }
        - { name: keyword, in: query, required: false, schema: { type: string } }
        - { name: since, in: query, required: false, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: 日志行
          content:
            application/json:
              schema:
                type: object
                properties:
                  lines: { type: array, items: { type: string } }
                  next_offset: { type: integer, format: int64 }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [logs]
      summary: 清空日志视图（设置"已清空"水位线，不删除文件）
      responses:
        "204": { description: 已设置水位线 }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/configs/{id}/logs/files:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [logs]
      summary: 列出本实例日志文件（含轮转副本）
      responses:
        "200":
          description: 文件列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        path: { type: string }
                        rotated_at: { type: string, format: date-time }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/configs/{id}/logs/tail:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
      - { name: token, in: query, required: false, schema: { type: string }, description: WebSocket 鉴权令牌 }
    get:
      tags: [logs]
      summary: 实时跟踪日志（WebSocket 升级，原始文本行）
      description: "升级为 WebSocket；每帧为 JSON `{\"line\":\"<日志行>\"}`。结构化日志请用 /logs/stream。"
      responses:
        "101": { description: 协议切换为 WebSocket }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/configs/{id}/logs/stream:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
      - { name: token, in: query, required: false, schema: { type: string }, description: WebSocket 鉴权令牌 }
      - { name: level, in: query, required: false, schema: { type: string, enum: [debug, info, warn, error, fatal] }, description: 最低级别过滤 }
      - { name: keyword, in: query, required: false, schema: { type: string }, description: 子串过滤（匹配 message+raw，大小写不敏感） }
      - { name: conn_index, in: query, required: false, schema: { type: integer }, description: 仅某条 edge 连接的日志 }
      - { name: backlog, in: query, required: false, schema: { type: integer, default: 500 }, description: 连接时回放的历史行数 }
    get:
      tags: [logs]
      summary: 结构化实时日志流（WebSocket 升级）
      description: |
        升级为 WebSocket，订阅子进程结构化日志。每帧为 JSON `{"entries":[LogEntry,...]}`：
        连接时先发一帧历史（按 backlog + 过滤 + 清空水位），之后每条新行一帧（长度 1）。
        前端按 `seq` 去重（订阅先于快照，边界可能出现一条重复）。
      responses:
        "101": { description: "协议切换为 WebSocket（每帧为 entries 数组）" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/configs/{id}/live:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [metrics]
      summary: 实例实时状态（按需抓取 cloudflared /metrics，不落库）
      description: "未运行或抓取失败时以 200 + running=false 返回（calm 状态，非错误）。"
      responses:
        "200":
          description: 实时状态
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LiveStatus" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/configs/{id}/projection:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [configs]
      summary: 运行参数投影（cfdflags 投影出的真实 TUNNEL_* env / argv）
      description: "展示该实例实际以什么参数运行。TUNNEL_TOKEN 始终脱敏，绝不回明文。"
      responses:
        "200":
          description: 投影结果
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Projection" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/events:
    get:
      tags: [events]
      summary: 事件推送（WebSocket 升级）
      description: "升级为 WebSocket，推送 Event 帧。事件类型包含 config.changed / config.deleted / instance.state / instance.error / alert 等。"
      parameters:
        - { name: token, in: query, required: false, schema: { type: string }, description: WebSocket 鉴权令牌 }
        - { name: since, in: query, required: false, schema: { type: integer, format: int64 }, description: 回放 seq 大于该值的历史事件 }
        - { name: types, in: query, required: false, schema: { type: string }, description: 逗号分隔的事件类型过滤 }
        - { name: config_ids, in: query, required: false, schema: { type: string }, description: 逗号分隔的配置 id 过滤 }
      responses:
        "101": { description: 协议切换为 WebSocket（每帧为 Event） }

  /api/v1/import/file:
    post:
      tags: [importexport]
      summary: 导入单个 .yaml/.yml 文件
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
                id: { type: string, description: 可选，覆盖以文件名为准的 id }
      responses:
        "200":
          description: 已导入
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConfigEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/v1/import/url:
    post:
      tags: [importexport]
      summary: 从 URL 导入配置（仅允许公网 http/https）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url: { type: string }
                id: { type: string }
      responses:
        "200":
          description: 已导入
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConfigEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "502": { $ref: "#/components/responses/Error", description: 下载失败 }

  /api/v1/import/text:
    post:
      tags: [importexport]
      summary: 从文本（cloudflared YAML）导入配置
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, text]
              properties:
                id: { type: string }
                text: { type: string, description: cloudflared YAML 文本 }
      responses:
        "200":
          description: 已导入
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConfigEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/v1/import/zip:
    post:
      tags: [importexport]
      summary: 导入 /export/all 生成的 zip 备份
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary, description: 由 /export/all 导出的 zip }
      responses:
        "200":
          description: 已导入
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported: { type: array, items: { type: string } }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/v1/configs/{id}/export:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [importexport]
      summary: 导出单个配置 YAML（下载）
      responses:
        "200":
          description: YAML 下载
          content:
            text/yaml:
              schema: { type: string }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/export/all:
    get:
      tags: [importexport]
      summary: 导出全部配置为 zip（profiles/*.yaml + meta.json）
      responses:
        "200":
          description: zip 下载
          content:
            application/zip:
              schema: { type: string, format: binary }

  /api/v1/system/info:
    get:
      tags: [system]
      summary: 聚合系统信息快照（host/cpu/memory/disk/network/connections/process）
      responses:
        "200":
          description: 聚合快照（snake_case，各块尽力而为）
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /api/v1/system/cpu:
    get:
      tags: [system]
      summary: CPU 指标
      parameters:
        - { name: window, in: query, required: false, schema: { type: string, default: 200ms }, description: 采样窗口（最大 5s）}
      responses:
        "200":
          description: CPU 指标
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /api/v1/system/memory:
    get:
      tags: [system]
      summary: 内存指标（虚拟 + swap）
      responses:
        "200":
          description: 内存指标
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /api/v1/system/disk:
    get:
      tags: [system]
      summary: 磁盘使用（数据目录 + 根）
      parameters:
        - { name: paths, in: query, required: false, schema: { type: string }, description: 逗号分隔的额外绝对路径 }
      responses:
        "200":
          description: 磁盘项列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { type: object, additionalProperties: true } }

  /api/v1/system/network:
    get:
      tags: [system]
      summary: 各网卡字节 / 包计数
      responses:
        "200":
          description: 网卡项列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { type: object, additionalProperties: true } }

  /api/v1/system/connections:
    get:
      tags: [system]
      summary: 主机套接字计数汇总
      responses:
        "200":
          description: 连接汇总
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /api/v1/system/process:
    get:
      tags: [system]
      summary: 守护进程自身进程信息
      responses:
        "200":
          description: 进程信息
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /api/v1/binaries:
    get:
      tags: [binaries]
      summary: 列出本地已安装的 cloudflared 版本
      responses:
        "200":
          description: 已安装版本列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/BinaryItem" }

  /api/v1/binaries/available:
    get:
      tags: [binaries]
      summary: 列出 GitHub 上可下载的 release
      responses:
        "200":
          description: 可用 release 列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/AvailableRelease" }
        "502": { $ref: "#/components/responses/Error", description: 拉取 release 失败 }

  /api/v1/binaries/install:
    post:
      tags: [binaries]
      summary: 下载并安装一个 cloudflared 版本
      description: "version 允许 `latest`；省略时回退到 CFDM_CLOUDFLARED_DEFAULT_VERSION（默认 latest）。安装后不自动激活。"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                version: { type: string }
      responses:
        "201":
          description: 已安装
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VersionMeta" }
        "400": { $ref: "#/components/responses/BadRequest", description: 非法 version tag }
        "502": { $ref: "#/components/responses/Error", description: 安装 / 下载失败 }

  /api/v1/binaries/{version}/activate:
    parameters:
      - { name: version, in: path, required: true, schema: { type: string } }
    post:
      tags: [binaries]
      summary: 将某版本设为当前激活版本
      responses:
        "200":
          description: 已激活
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { type: string }
                  active: { type: boolean }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound", description: 版本未安装 }

  /api/v1/binaries/{version}:
    parameters:
      - { name: version, in: path, required: true, schema: { type: string } }
    delete:
      tags: [binaries]
      summary: 删除已安装版本
      responses:
        "204": { description: 已删除 }
        "404": { $ref: "#/components/responses/NotFound", description: 版本未安装 }
        "409": { $ref: "#/components/responses/Conflict", description: 当前激活版本不可删除 }

  # ── Cloudflare 账号直连集成 ───────────────────────────────────────────────
  /api/v1/cf/accounts:
    get:
      tags: [cloudflare]
      summary: 列出 Cloudflare 账号（脱敏）
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: "#/components/schemas/CFAccountView" } }
    post:
      tags: [cloudflare]
      summary: 新建账号（自动校验并探测 account_id）
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CFAccountInput" }
      responses:
        "201":
          description: 已创建（含校验结果）
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CFAccountResp" }
        "400": { $ref: "#/components/responses/BadRequest" }
  /api/v1/cf/accounts/{aid}:
    parameters:
      - { name: aid, in: path, required: true, schema: { type: string } }
    get:
      tags: [cloudflare]
      summary: 账号详情（脱敏）
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CFAccountView" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [cloudflare]
      summary: 改名 / 换凭证（空 secret = 保留）并重新校验
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CFAccountInput" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CFAccountResp" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [cloudflare]
      summary: 删除账号
      responses:
        "204": { description: 已删除 }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/cf/accounts/{aid}/verify:
    parameters:
      - { name: aid, in: path, required: true, schema: { type: string } }
    post:
      tags: [cloudflare]
      summary: 重新校验凭证、刷新状态与 account_id
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CFAccountResp" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/cf/accounts/{aid}/cf-accounts:
    parameters:
      - { name: aid, in: path, required: true, schema: { type: string } }
    get:
      tags: [cloudflare]
      summary: 列出该凭证可见的 Cloudflare 账号（多账号选择 account_id）
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: "#/components/schemas/CFAccount" } }
        "502": { description: Cloudflare 上游错误, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /api/v1/cf/accounts/{aid}/tunnels:
    parameters:
      - { name: aid, in: path, required: true, schema: { type: string } }
    get:
      tags: [cloudflare]
      summary: 列出远端隧道
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: "#/components/schemas/CFTunnel" } }
        "409": { $ref: "#/components/responses/Conflict", description: 账号尚未确定 account_id }
    post:
      tags: [cloudflare]
      summary: 新建远端隧道
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                config_src: { type: string, enum: [cloudflare, local], default: cloudflare }
      responses:
        "201": { description: 已创建, content: { application/json: { schema: { $ref: "#/components/schemas/CFTunnel" } } } }
  /api/v1/cf/accounts/{aid}/tunnels/{tid}:
    parameters:
      - { name: aid, in: path, required: true, schema: { type: string } }
      - { name: tid, in: path, required: true, schema: { type: string } }
    get:
      tags: [cloudflare]
      summary: 获取远端隧道
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CFTunnel" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [cloudflare]
      summary: 重命名远端隧道
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [name], properties: { name: { type: string } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CFTunnel" } } } }
    delete:
      tags: [cloudflare]
      summary: 删除远端隧道
      responses:
        "204": { description: 已删除 }
  /api/v1/cf/accounts/{aid}/tunnels/{tid}/token:
    parameters:
      - { name: aid, in: path, required: true, schema: { type: string } }
      - { name: tid, in: path, required: true, schema: { type: string } }
    get:
      tags: [cloudflare]
      summary: 获取远端隧道 connector token（敏感）
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: object, properties: { token: { type: string } } } } } }
  /api/v1/cf/accounts/{aid}/tunnels/{tid}/configurations:
    parameters:
      - { name: aid, in: path, required: true, schema: { type: string } }
      - { name: tid, in: path, required: true, schema: { type: string } }
    get:
      tags: [cloudflare]
      summary: 获取隧道远端配置（ingress / originRequest）
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CFConfigurationResult" } } } }
    put:
      tags: [cloudflare]
      summary: 整体替换隧道配置（CF 仅支持全量替换）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [config]
              properties:
                config: { $ref: "#/components/schemas/CFTunnelConfig" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CFConfigurationResult" } } } }
  /api/v1/cf/accounts/{aid}/tunnels/{tid}/connections:
    parameters:
      - { name: aid, in: path, required: true, schema: { type: string } }
      - { name: tid, in: path, required: true, schema: { type: string } }
    get:
      tags: [cloudflare]
      summary: 列出连接器
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/CFConnector" } } } }
    delete:
      tags: [cloudflare]
      summary: 清理连接（client_id 省略=清理全部）
      parameters:
        - { name: client_id, in: query, required: false, schema: { type: string } }
      responses:
        "204": { description: 已清理 }
  /api/v1/cf/accounts/{aid}/zones:
    parameters:
      - { name: aid, in: path, required: true, schema: { type: string } }
      - { name: name, in: query, required: false, schema: { type: string }, description: 精确域名过滤 }
    get:
      tags: [cloudflare]
      summary: 列出 DNS zones
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/CFZone" } } } }
  /api/v1/cf/accounts/{aid}/zones/{zid}/dns_records:
    parameters:
      - { name: aid, in: path, required: true, schema: { type: string } }
      - { name: zid, in: path, required: true, schema: { type: string } }
    get:
      tags: [cloudflare]
      summary: 列出 DNS 记录
      parameters:
        - { name: name, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: object, properties: { items: { type: array, items: { $ref: "#/components/schemas/CFDNSRecord" } } } }
    post:
      tags: [cloudflare]
      summary: 新建 DNS 记录
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CFDNSRecord" }
      responses:
        "201": { description: 已创建, content: { application/json: { schema: { $ref: "#/components/schemas/CFDNSRecord" } } } }
  /api/v1/cf/accounts/{aid}/zones/{zid}/dns_records/{rid}:
    parameters:
      - { name: aid, in: path, required: true, schema: { type: string } }
      - { name: zid, in: path, required: true, schema: { type: string } }
      - { name: rid, in: path, required: true, schema: { type: string } }
    put:
      tags: [cloudflare]
      summary: 替换 DNS 记录
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CFDNSRecord" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CFDNSRecord" } } } }
    delete:
      tags: [cloudflare]
      summary: 删除 DNS 记录
      responses:
        "204": { description: 已删除 }
  /api/v1/configs/{id}/cf/token-info:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [cloudflare]
      summary: 解码本地实例 token → account_tag / tunnel_id（无 secret）
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CFTokenInfo" }
  /api/v1/configs/{id}/cf/binding:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [cloudflare]
      summary: 当前实例↔隧道绑定 + 远端隧道概要
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CFBinding" } } } }
    put:
      tags: [cloudflare]
      summary: 关联实例到隧道（归属校验）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account_id]
              properties:
                account_id: { type: string, description: 本地 cfaccount id }
                tunnel_id: { type: string, description: 缺省时用 token 解出的 tunnel_id }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CFBinding" } } } }
        "400": { $ref: "#/components/responses/BadRequest", description: 隧道不属于此账号 / 无法确定 tunnel_id }
    delete:
      tags: [cloudflare]
      summary: 解绑
      responses:
        "204": { description: 已解绑 }
  /api/v1/configs/{id}/cf/public-hostnames:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [cloudflare]
      summary: 聚合实例的公共主机名（ingress + 各自 DNS 状态）
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CFPublicHostnameList" } } } }
        "409": { $ref: "#/components/responses/Conflict", description: 实例未关联账号 }
    post:
      tags: [cloudflare]
      summary: 新增公共主机名（插入 ingress + 建/改代理 CNAME）
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CFPublicHostnameInput" }
      responses:
        "201": { description: 已创建, content: { application/json: { schema: { type: object } } } }
  /api/v1/configs/{id}/cf/public-hostnames/{index}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
      - { name: index, in: path, required: true, schema: { type: integer }, description: ingress 规则下标（不能指向兜底规则） }
    put:
      tags: [cloudflare]
      summary: 修改第 index 条公共主机名（含 DNS 同步）
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CFPublicHostnameInput" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: object } } } }
    delete:
      tags: [cloudflare]
      summary: 删除第 index 条公共主机名
      parameters:
        - { name: delete_dns, in: query, required: false, schema: { type: string, enum: ["true"] }, description: 同时删除代理 CNAME }
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: object } } } }

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: "Authorization: Bearer <CFDM_API_TOKEN>。WebSocket 接口可改用 ?token= 查询参数。"

  responses:
    BadRequest:
      description: 请求非法
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: 状态冲突
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Error:
      description: 错误
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      description: 统一错误信封
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: 机器可读错误码
              enum:
                - bad_request
                - unauthorized
                - forbidden
                - not_found
                - conflict
                - validation_failed
                - internal_error
                - config_not_found
                - config_already_exists
                - invalid_state
                - upstream_failure
            message: { type: string }
            details: { type: object, additionalProperties: true }

    TunnelConfigV1:
      type: object
      description: "单个 cloudflared 连接器的本地配置模型（camelCase）。仅建模 `cloudflared tunnel run --token` 消费的参数。"
      properties:
        token:
          type: string
          writeOnly: true
          description: "cloudflared 连接器令牌（高度敏感）。返回信封时一律被剥除；仅 raw YAML 接口按设计包含。"
        edge: { $ref: "#/components/schemas/EdgeConfig" }
        reliability: { $ref: "#/components/schemas/ReliabilityConfig" }
        logging: { $ref: "#/components/schemas/LoggingConfig" }
        identity: { $ref: "#/components/schemas/IdentityConfig" }
        advancedEnvOverrides:
          type: object
          additionalProperties: { type: string }
          description: 未建模 cloudflared 环境变量的逃生舱（受 pkg/cfdflags 白名单约束）
        binaryVersion:
          type: string
          description: "绑定该实例使用的 cloudflared 版本；空 / current 跟随全局激活版本。"

    EdgeConfig:
      type: object
      properties:
        protocol:
          type: string
          enum: [auto, http2, quic]
          description: cloudflared 与边缘之间的传输（auto 优先 QUIC 回落 HTTP/2）
        edgeIpVersion:
          type: string
          enum: ["auto", "4", "6"]
          description: 拨向边缘的 IP 族
        edgeBindAddress:
          type: string
          description: 出站边缘连接固定的本地源 IP
        region:
          type: string
          enum: ["", "us"]
          description: 限制边缘路由区域；空为全局
        postQuantum:
          type: boolean
          description: 强制后量子密钥交换；仅在 protocol == quic 时有效

    ReliabilityConfig:
      type: object
      properties:
        retries:
          type: integer
          minimum: 0
          maximum: 20
          description: 放弃前的连接 / 协议重试上限
        gracePeriod:
          type: string
          description: 收到终止信号后等待在途请求完成的时长（Go duration 字符串，如 "30s"）

    LoggingConfig:
      type: object
      properties:
        logLevel:
          type: string
          enum: [debug, info, warn, error, fatal]
          description: 应用级日志级别
        transportLogLevel:
          type: string
          enum: [debug, info, warn, error, fatal]
          description: QUIC/HTTP2 传输级日志级别

    IdentityConfig:
      type: object
      properties:
        label:
          type: string
          description: 连接器显示名（经 argv 注入）
        tags:
          type: object
          additionalProperties: { type: string }
          description: 上报到 Zero Trust 控制台的键值标注

    Snapshot:
      type: object
      description: 单个隧道实例的运行时状态视图（snake_case）
      properties:
        id: { type: string }
        name: { type: string }
        path: { type: string, description: 配置文件路径（.yaml）}
        log_path: { type: string }
        state: { type: string, enum: [stopped, starting, started, stopping] }
        last_error: { type: string }
        started_at: { type: string, format: date-time }
        stopped_at: { type: string, format: date-time }
        binary_version: { type: string, description: 该实例当前使用的 cloudflared 版本 }
        pid: { type: integer, description: 子进程 pid，0 表示未运行 }
        metrics_port: { type: integer, description: 分配给该实例的 metrics 端口 }

    MgrMeta:
      type: object
      description: 管理器级元数据（存于 meta.json，不在隧道 YAML 内）
      properties:
        name: { type: string, description: 显示名 }
        manualStart: { type: boolean, description: 是否禁用守护进程自启动 }

    ConfigEnvelope:
      type: object
      description: "Snapshot 字段 + config（TunnelConfigV1，token 已剥除）+ cfdmgr + has_token。"
      allOf:
        - $ref: "#/components/schemas/Snapshot"
        - type: object
          properties:
            config: { $ref: "#/components/schemas/TunnelConfigV1" }
            cfdmgr: { $ref: "#/components/schemas/MgrMeta" }
            has_token:
              type: boolean
              description: 是否已存储 token（不泄露明文）

    TrafficPoint:
      type: object
      description: "历史曲线单点（注意语义：in=请求数增量、out=错误数增量、conns=HA 连接数 gauge，均非字节）。"
      properties:
        ts: { type: integer, format: int64, description: unix 秒 }
        in: { type: number, description: 请求数增量（非字节）}
        out: { type: number, description: 错误数增量（非字节）}
        conns: { type: number, description: HA 连接数 gauge }

    AlertRule:
      type: object
      description: 用户定义的阈值告警规则（snake_case）
      required: [name, metric, op]
      properties:
        id: { type: string, description: 省略时自动生成 }
        name: { type: string }
        enabled: { type: boolean }
        inst_id: { type: string, description: "目标实例 id；\"*\" 表示全部" }
        metric:
          type: string
          enum: [conns, requests_rate, errors_rate, traffic_in_rate, traffic_out_rate]
          description: "conns | requests_rate | errors_rate（traffic_in_rate / traffic_out_rate 为遗留别名）"
        op:
          type: string
          enum: [">", ">=", "<", "<="]
        threshold: { type: number }
        for_seconds: { type: integer, description: 必须持续多久才触发（去抖）}
        target: { type: string, description: "代理名，或 \"\" / \"*\" 表示 server 范围" }
        webhook: { type: string, description: 触发 / 恢复时可选 POST 的 URL }

    AlertEvent:
      type: object
      description: 告警的触发 / 恢复事件（snake_case）
      properties:
        id: { type: string }
        rule_id: { type: string }
        inst_id: { type: string }
        target: { type: string }
        fired_at: { type: integer, format: int64, description: unix 秒 }
        resolved_at: { type: integer, format: int64, description: 0 表示仍在触发 }
        value: { type: number }
        state: { type: string, enum: [firing, resolved] }

    LogEntry:
      type: object
      description: "结构化日志条目（WS /logs/stream 的帧元素，snake_case）。"
      properties:
        seq: { type: integer, format: int64, description: 单调递增序号，前端按此去重 }
        time: { type: string, format: date-time }
        level: { type: string, enum: [debug, info, warn, error, fatal, unknown] }
        message: { type: string }
        event: { type: integer, description: cloudflared event 码（可选）}
        conn_index: { type: integer, description: 关联的 edge 连接号（可选）}
        tunnel_id: { type: string }
        raw: { type: string, description: 原始行（JSON 解析失败时等于整行）}
        fields: { type: object, additionalProperties: true, description: 解析出的完整 JSON 字段 }
        source: { type: string, enum: [stderr, stdout, stream, daemon] }

    EdgeConnection:
      type: object
      description: 一条 cloudflared↔边缘连接的实时统计（按 conn_index）
      properties:
        conn_index: { type: integer }
        location: { type: string, description: 边缘数据中心三字码（colo），可缺 }
        rtt: { type: number, description: smoothed RTT（cloudflared 原生单位，UI 仅标 RTT 不臆断单位）}
        lost_packets: { type: number }

    LiveStatus:
      type: object
      description: "GET /configs/{id}/live 的按需抓取结果（不落库，snake_case）。未运行时仅 running=false。"
      properties:
        running: { type: boolean }
        scraped_at: { type: integer, format: int64, description: unix 秒 }
        ha_connections: { type: integer }
        requests_total: { type: integer, format: int64 }
        request_errors: { type: integer, format: int64 }
        response_5xx: { type: integer, format: int64 }
        goroutines: { type: integer }
        resident_memory_bytes: { type: integer, format: int64 }
        version: { type: string, description: cloudflared build_info 版本，可缺 }
        protocol: { type: string, enum: [quic, http2, unknown] }
        connections:
          type: array
          items: { $ref: "#/components/schemas/EdgeConnection" }
        error: { type: string, description: 抓取失败原因（running=false 时可有）}

    Projection:
      type: object
      description: "GET /configs/{id}/projection；cfdflags 投影出的真实运行参数。TUNNEL_TOKEN 已脱敏。"
      properties:
        env:
          type: object
          additionalProperties: { type: string }
          description: 投影出的 TUNNEL_* 环境变量（含脱敏 TUNNEL_TOKEN）
        argv: { type: array, items: { type: string } }
        binary_version: { type: string }
        binary_path: { type: string }

    Event:
      type: object
      description: WebSocket /events 推送的单条事件帧
      properties:
        seq: { type: integer, format: int64 }
        type:
          type: string
          enum: [instance.state, instance.error, config.changed, config.deleted, alert]
        config_id: { type: string }
        ts: { type: string, format: date-time }
        data: { type: object, additionalProperties: true, description: 类型相关的载荷 }

    BinaryItem:
      type: object
      description: 一个本地已安装的 cloudflared 版本（snake_case）
      properties:
        version: { type: string }
        path: { type: string }
        sha256: { type: string }
        source_url: { type: string }
        mirror: { type: string }
        downloaded_at: { type: string, format: date-time }
        size_bytes: { type: integer, format: int64 }
        verified: { type: boolean }
        is_active: { type: boolean }

    AvailableRelease:
      type: object
      description: GitHub 上一个可下载的 cloudflared release（snake_case）
      properties:
        tag_name: { type: string }
        published_at: { type: string, format: date-time }
        html_url: { type: string }
        asset_url: { type: string }
        sha256: { type: string }

    VersionMeta:
      type: object
      description: 安装一个 cloudflared 版本后持久化的元数据（snake_case）
      properties:
        version: { type: string }
        platform: { type: string }
        arch: { type: string }
        asset_name: { type: string }
        sha256: { type: string }
        source_url: { type: string }
        mirror: { type: string }
        downloaded_at: { type: string, format: date-time }
        size_bytes: { type: integer, format: int64 }
        verified: { type: boolean }

    VersionCheck:
      type: object
      description: "GET /version/check 的响应；获取最新版失败时仅含 current / *_enabled / has_update=false / can_self_update=false / reason / check_error。"
      properties:
        current: { type: string }
        latest: { type: string }
        deployment_mode: { type: string }
        self_update_enabled: { type: boolean }
        has_update: { type: boolean }
        can_self_update: { type: boolean }
        reason: { type: string }
        changelog: { type: string }
        html_url: { type: string }
        published_at: { type: string, format: date-time }
        check_error: { type: string }

    Branding:
      type: object
      description: "UI 品牌（snake_case）。GET 返回生效值（空字段已填默认）；PUT 时省略字段保留原值、空串重置为默认。"
      properties:
        app_name: { type: string, maxLength: 40, description: "品牌名（侧边栏 / 登录页顶部），默认「Cloudflared 隧道管理器」" }
        app_subtitle: { type: string, maxLength: 60, description: "副标题（登录页小字），默认「Cloudflare Tunnel 管理面板」" }
        html_title: { type: string, maxLength: 120, description: "浏览器标签 <title>，默认「Cloudflared 隧道管理器 · Cloudflare Tunnel 管理面板」" }

    # ── Cloudflare 集成 schemas ──────────────────────────────────────────
    CFAccountInput:
      type: object
      description: "新建/更新账号入参。更新时空 secret = 保留原值。"
      required: [name, auth_type]
      properties:
        name: { type: string }
        auth_type: { type: string, enum: [token, key] }
        token: { type: string, description: "API Token（auth_type=token）" }
        email: { type: string, description: "账户邮箱（auth_type=key）" }
        api_key: { type: string, description: "Global API Key（auth_type=key）" }
        account_id: { type: string, description: "可选，显式指定 Cloudflare account id；留空自动探测" }
    CFAccountView:
      type: object
      description: "脱敏账号视图（snake_case）。secret 永不回传，仅 has_token/has_key。"
      properties:
        id: { type: string, description: 本地账号 id }
        name: { type: string }
        auth_type: { type: string, enum: [token, key] }
        account_id: { type: string, description: Cloudflare account id }
        account_name: { type: string }
        email: { type: string }
        has_token: { type: boolean }
        has_key: { type: boolean }
        status: { type: string, enum: [unverified, active, invalid] }
        last_verified_at: { type: string }
        created_at: { type: string }
        updated_at: { type: string }
    CFAccount:
      type: object
      description: "Cloudflare 账号（GET /accounts 元素）"
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string }
    CFAccountVerify:
      type: object
      properties:
        ok: { type: boolean }
        error: { type: string }
        accounts: { type: array, items: { $ref: "#/components/schemas/CFAccount" } }
    CFAccountResp:
      type: object
      properties:
        account: { $ref: "#/components/schemas/CFAccountView" }
        verify: { $ref: "#/components/schemas/CFAccountVerify" }
    CFTunnel:
      type: object
      description: "远端隧道（cfd_tunnel，snake_case）"
      properties:
        id: { type: string }
        account_tag: { type: string }
        name: { type: string }
        created_at: { type: string }
        deleted_at: { type: string }
        conns_active_at: { type: string }
        conns_inactive_at: { type: string }
        status: { type: string, enum: [inactive, degraded, healthy, down] }
        tun_type: { type: string }
        config_src: { type: string, enum: [local, cloudflare] }
        remote_config: { type: boolean }
        connections: {}
    CFIngressRule:
      type: object
      description: "ingress 规则（camelCase，原样直传 cloudflared）"
      properties:
        hostname: { type: string }
        service: { type: string, description: "如 http://localhost:8080 / tcp://... / http_status:404" }
        path: { type: string }
        originRequest: { type: object, additionalProperties: true, description: "连接参数：connectTimeout/noTLSVerify/httpHostHeader/access{required,teamName,audTag[]}…" }
    CFTunnelConfig:
      type: object
      properties:
        ingress: { type: array, items: { $ref: "#/components/schemas/CFIngressRule" } }
        originRequest: { type: object, additionalProperties: true, description: 全局默认连接参数 }
        warp-routing: { type: object, properties: { enabled: { type: boolean } } }
    CFConfigurationResult:
      type: object
      properties:
        account_id: { type: string }
        tunnel_id: { type: string }
        version: { type: integer }
        config: { $ref: "#/components/schemas/CFTunnelConfig" }
        source: { type: string }
        created_at: { type: string }
    CFConnector:
      type: object
      properties:
        id: { type: string }
        features: { type: array, items: { type: string } }
        version: { type: string }
        arch: { type: string }
        run_at: { type: string }
        config_version: { type: integer }
        conns: {}
    CFZone:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        status: { type: string }
        paused: { type: boolean }
        account: { type: object, properties: { id: { type: string }, name: { type: string } } }
    CFDNSRecord:
      type: object
      properties:
        id: { type: string }
        type: { type: string, description: "CNAME / A / TXT …（隧道公共主机名用 CNAME）" }
        name: { type: string }
        content: { type: string, description: "隧道 CNAME 指向 <tunnel_id>.cfargotunnel.com" }
        proxied: { type: boolean }
        ttl: { type: integer, description: "1 = 自动" }
        comment: { type: string }
        proxiable: { type: boolean }
        created_on: { type: string }
        modified_on: { type: string }
    CFTokenInfo:
      type: object
      properties:
        has_token: { type: boolean }
        account_tag: { type: string }
        tunnel_id: { type: string }
        error: { type: string }
    CFBinding:
      type: object
      properties:
        bound: { type: boolean }
        account_id: { type: string }
        account_name: { type: string }
        cf_account_id: { type: string }
        tunnel_id: { type: string }
        tunnel_name: { type: string }
        account_tag: { type: string }
        token_account_tag: { type: string }
        token_tunnel_id: { type: string }
        match: { type: boolean, description: "token 解出的 tunnel_id 是否与绑定一致" }
        tunnel: { $ref: "#/components/schemas/CFTunnel" }
    CFDNSStatus:
      type: object
      properties:
        zone_id: { type: string }
        zone_name: { type: string }
        record_id: { type: string }
        content: { type: string }
        proxied: { type: boolean }
        exists: { type: boolean }
        in_sync: { type: boolean }
    CFPublicHostname:
      type: object
      properties:
        index: { type: integer }
        hostname: { type: string }
        service: { type: string }
        path: { type: string }
        origin_request: { type: object, additionalProperties: true }
        dns: { $ref: "#/components/schemas/CFDNSStatus" }
    CFPublicHostnameList:
      type: object
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/CFPublicHostname" } }
        tunnel_id: { type: string }
        dns_error: { type: string, description: "DNS 富集为尽力而为；权限/zone 缺失时此处给出原因，不影响主体返回" }
    CFPublicHostnameInput:
      type: object
      required: [hostname, service]
      properties:
